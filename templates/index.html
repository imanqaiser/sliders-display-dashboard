<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sliders Task Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a; --border: #2e3250;
    --accent: #4f7cff; --accent2: #7c5cfc; --green: #22c987; --amber: #f5a623;
    --red: #f25c5c; --text: #e8eaf6; --muted: #7b82a6; --radius: 10px;
    --font: 'Inter','Segoe UI',system-ui,sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; min-height: 100vh; }
  .app { display: grid; grid-template-columns: 300px 1fr; min-height: 100vh; }

  /* ── Sidebar ── */
  .sidebar { background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; overflow: hidden; }
  .sidebar-header { padding: 18px 18px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .sidebar-header h1 { font-size: 15px; font-weight: 600; color: var(--text); }
  .sidebar-header p { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .nav-row { display: flex; gap: 6px; margin-top: 12px; }
  .nav-btn {
    flex: 1; font-size: 11px; font-weight: 600; padding: 7px 0; border-radius: 8px;
    border: 1px solid var(--border); background: var(--surface2); color: var(--muted);
    cursor: pointer; transition: all 0.12s;
  }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }
  .nav-btn.active { background: rgba(79,124,255,0.15); border-color: var(--accent); color: var(--accent); }

  .likert-row { padding: 14px 0; border-bottom: 1px solid var(--border); }
  .likert-row:last-child { border-bottom: none; }
  .likert-question { font-size: 13px; color: var(--text); margin-bottom: 10px; }
  .likert-scale { display: flex; align-items: center; gap: 10px; }
  .likert-end-label { font-size: 10px; color: var(--muted); flex-shrink: 0; width: 78px; }
  .likert-end-label:last-child { text-align: right; }
  .likert-points { display: flex; flex: 1; justify-content: space-between; }
  .likert-point { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .likert-dot {
    width: 22px; height: 22px; border-radius: 50%; border: 1px solid var(--border);
    background: var(--surface2); display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; color: transparent;
  }
  .likert-point.selected .likert-dot {
    background: linear-gradient(135deg,var(--accent),var(--accent2)); border-color: var(--accent);
    color: #fff; box-shadow: 0 0 0 3px rgba(79,124,255,0.2);
  }
  .likert-num { font-size: 9px; color: var(--muted); }
  .conditions-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .condition-block { display: flex; flex-direction: column; gap: 0; }
  .condition-label { font-size: 13px; font-weight: 700; color: var(--accent); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.06em; }

  /* ── Filters ── */
  .filters { padding: 14px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; display: flex; flex-direction: column; gap: 12px; }
  .filter-row { display: flex; flex-direction: column; gap: 5px; }
  .filter-label { display: flex; justify-content: space-between; align-items: center; }
  .filter-label span { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
  .filter-label .filter-val { color: var(--accent); font-size: 11px; text-transform: none; letter-spacing: 0; font-weight: 600; }

  /* Range slider */
  .range-wrap { position: relative; height: 20px; display: flex; align-items: center; }
  input[type=range] {
    -webkit-appearance: none; appearance: none; width: 100%; height: 4px;
    background: var(--surface2); border-radius: 2px; outline: none; cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent); border: 2px solid var(--bg); cursor: pointer;
    box-shadow: 0 0 0 1px var(--accent);
  }
  input[type=range].active-track { background: linear-gradient(to right, var(--accent) 0%, var(--accent) var(--pct), var(--surface2) var(--pct), var(--surface2) 100%); }

  /* Pill toggles */
  .pill-row { display: flex; gap: 5px; flex-wrap: wrap; }
  .pill {
    padding: 4px 11px; border-radius: 20px; font-size: 11px; font-weight: 500;
    border: 1px solid var(--border); background: var(--surface2); color: var(--muted);
    cursor: pointer; transition: all 0.12s; user-select: none;
  }
  .pill:hover { border-color: var(--accent); color: var(--accent); }
  .pill.active { background: rgba(79,124,255,0.15); border-color: var(--accent); color: var(--accent); }
  .pill.all { border-style: dashed; }

  .filter-actions { display: flex; justify-content: space-between; align-items: center; margin-top: -2px; }
  .match-count { font-size: 11px; color: var(--muted); }
  .match-count strong { color: var(--text); }
  .clear-btn { font-size: 11px; color: var(--muted); background: none; border: none; cursor: pointer; text-decoration: underline; padding: 0; }
  .clear-btn:hover { color: var(--text); }

  /* ── Participant list ── */
  .participant-list { flex: 1; overflow-y: auto; padding: 10px; }
  .p-list-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); padding: 4px 8px 8px; }
  .p-btn {
    display: flex; align-items: center; gap: 10px; width: 100%; padding: 9px 10px;
    background: none; border: 1px solid transparent; border-radius: 8px; cursor: pointer;
    color: var(--muted); text-align: left; transition: all 0.12s; margin-bottom: 2px;
  }
  .p-btn:hover { background: var(--surface2); color: var(--text); }
  .p-btn.active { background: var(--surface2); border-color: var(--border); color: var(--text); }
  .p-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .p-info { flex: 1; min-width: 0; }
  .p-name { font-size: 12px; font-weight: 500; color: inherit; }
  .p-chips { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 3px; }
  .p-chip { font-size: 9px; padding: 1px 6px; border-radius: 10px; background: var(--surface); border: 1px solid var(--border); color: var(--muted); }
  .p-rate { font-size: 11px; font-weight: 600; flex-shrink: 0; }
  .no-match { font-size: 12px; color: var(--muted); font-style: italic; padding: 12px 8px; }

  /* ── Main ── */
  .main { padding: 28px 32px; overflow-y: auto; }

  /* ── Summary table ── */
  .summary-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 16px; }
  .summary-header h2 { font-size: 16px; font-weight: 600; }
  .summary-header p { font-size: 12px; color: var(--muted); }
  .summary-table { width: 100%; border-collapse: collapse; margin-bottom: 28px; }
  .summary-table th { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); }
  .summary-table td { padding: 10px 12px; border-bottom: 1px solid rgba(46,50,80,0.5); font-size: 12px; vertical-align: middle; }
  .summary-table tr:hover td { background: var(--surface2); cursor: pointer; }
  .summary-table tr.selected td { background: rgba(79,124,255,0.08); }
  .drill-btn { font-size: 11px; color: var(--accent); background: none; border: none; cursor: pointer; padding: 3px 8px; border-radius: 4px; border: 1px solid rgba(79,124,255,0.3); }
  .drill-btn:hover { background: rgba(79,124,255,0.12); }

  /* progress bar in table */
  .mini-bar-wrap { display: flex; align-items: center; gap: 8px; }
  .mini-bar { height: 5px; border-radius: 3px; background: var(--surface2); flex: 1; overflow: hidden; }
  .mini-bar-fill { height: 100%; border-radius: 3px; }

  /* ── Drill-in panel ── */
  .drill-panel { display: none; }
  .drill-panel.visible { display: block; }
  .back-btn { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); background: none; border: none; cursor: pointer; margin-bottom: 20px; padding: 0; }
  .back-btn:hover { color: var(--text); }

  /* task strip */
  .task-strip { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
  .task-chip {
    padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 500;
    border: 1px solid var(--border); background: var(--surface2); color: var(--muted);
    cursor: pointer; transition: all 0.12s;
  }
  .task-chip:hover { border-color: var(--accent); color: var(--accent); }
  .task-chip.active { background: rgba(79,124,255,0.15); border-color: var(--accent); color: var(--accent); }
  .task-chip.success { border-color: rgba(34,201,135,0.4); }
  .task-chip.skip { border-color: rgba(79,124,255,0.4); }
  .task-chip.failure { border-color: rgba(242,92,92,0.4); }

  /* session bar */
  .session-bar { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 20px; margin-bottom: 24px; display: flex; gap: 24px; flex-wrap: wrap; align-items: center; }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat-val { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
  .stat-label { font-size: 10px; color: var(--muted); letter-spacing: 0.04em; text-transform: uppercase; }
  .session-bar .divider { width: 1px; height: 32px; background: var(--border); }
  .config-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-left: auto; }
  .config-chip { font-size: 11px; padding: 3px 9px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); }

  /* task detail */
  .task-header { display: flex; gap: 20px; align-items: flex-start; margin-bottom: 24px; }
  .target-img { width: 110px; height: 110px; object-fit: cover; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface2); flex-shrink: 0; cursor: zoom-in; transition: opacity 0.15s; }
  .target-img:hover { opacity: 0.85; }
  .task-info h2 { font-size: 17px; font-weight: 600; margin-bottom: 10px; }
  .badges { display: flex; gap: 8px; flex-wrap: wrap; }
  .badge { padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-green { background: rgba(34,201,135,0.28); color: #b3ffe0; border: 1px solid rgba(34,201,135,0.4); }
  .badge-amber { background: rgba(245,166,35,0.28); color: #ffe0ad; border: 1px solid rgba(245,166,35,0.4); }
  .badge-red   { background: rgba(242,92,92,0.28); color: #ffc7c7; border: 1px solid rgba(242,92,92,0.4); }
  .badge-blue  { background: rgba(79,124,255,0.28); color: #c9d6ff; border: 1px solid rgba(79,124,255,0.4); }
  .badge-muted { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; }
  .card h3 { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 12px; }
  .timeline { display: flex; flex-direction: column; gap: 0; }
  .timeline-item { display: grid; grid-template-columns: 38px 1fr; gap: 12px; position: relative; }
  .timeline-item:not(:last-child)::before { content: ''; position: absolute; left: 18px; top: 38px; bottom: -4px; width: 1px; background: var(--border); z-index: 0; }
  .step-circle { width: 38px; height: 38px; border-radius: 50%; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: var(--muted); flex-shrink: 0; position: relative; z-index: 1; }
  .step-circle.clicked { border-color: var(--green); color: var(--green); background: rgba(34,201,135,0.08); }
  .search-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 10px; }
  .search-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; gap: 10px; }
  .query { font-size: 13px; color: var(--text); font-style: italic; flex: 1; }
  .timestamp { font-size: 10px; color: var(--muted); }
  .sliders-grid { display: flex; flex-direction: column; gap: 4px; margin-top: 8px; border-top: 1px solid var(--border); padding-top: 8px; }
  .slider-row { display: flex; align-items: center; gap: 8px; }
  .slider-name { font-size: 11px; color: var(--muted); width: 90px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .slider-track { flex: 1; height: 4px; background: var(--surface2); border-radius: 2px; position: relative; overflow: visible; }
  .slider-track::after { content: ''; position: absolute; left: 50%; top: -3px; bottom: -3px; width: 1px; background: var(--border); transform: translateX(-0.5px); }
  .slider-fill { height: 100%; border-radius: 2px; position: absolute; top: 0; }
  .slider-pct { font-size: 10px; color: var(--muted); width: 30px; text-align: right; }
  .no-data { color: var(--muted); font-style: italic; font-size: 12px; }

  .search-steps-list { display: flex; flex-direction: column; gap: 6px; }
  .search-step { border: 1px solid var(--border); border-radius: 8px; background: var(--surface2); overflow: hidden; }
  .search-step-head { display: flex; align-items: center; gap: 7px; padding: 7px 10px; flex-wrap: wrap; }
  .step-num { font-size: 10px; color: var(--muted); font-weight: 700; width: 16px; flex-shrink: 0; }
  .step-config-toggle { font-size: 10px; color: var(--accent); margin-left: auto; flex-shrink: 0; cursor: pointer; padding: 2px 6px; border-radius: 5px; }
  .step-config-toggle:hover { background: rgba(79,124,255,0.12); }
  .step-changed-bars { padding: 2px 10px 8px; display: flex; flex-direction: column; gap: 4px; }
  .step-slider-detail { padding: 8px 10px 10px 32px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 3px; }
  .slider-num-row { display: flex; align-items: center; gap: 8px; font-size: 11px; padding: 2px 0; }
  .slider-num-row.zero { opacity: 0.4; }
  .slider-idx { color: var(--muted); width: 28px; flex-shrink: 0; font-weight: 600; }
  .slider-num-name { color: var(--text); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .slider-num-val { font-weight: 700; font-family: monospace; width: 60px; text-align: right; flex-shrink: 0; }

  /* modal */
  .img-modal-overlay { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.85); backdrop-filter: blur(6px); align-items: center; justify-content: center; cursor: zoom-out; }
  .img-modal-overlay.open { display: flex; }
  .img-modal-overlay img { max-width: 90vw; max-height: 90vh; border-radius: 12px; box-shadow: 0 0 60px rgba(0,0,0,0.8); animation: zoomIn 0.2s ease; }
  @keyframes zoomIn { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .loading { color: var(--muted); padding: 48px; text-align: center; font-size: 15px; }

  /* task comparison strip across participants */
  .compare-banner { background: rgba(79,124,255,0.07); border: 1px solid rgba(79,124,255,0.2); border-radius: var(--radius); padding: 10px 16px; margin-bottom: 20px; font-size: 12px; color: var(--accent); display: none; }
  .compare-banner.visible { display: block; }
</style>
</head>
<body>
<div class="app">
  <!-- ══ SIDEBAR ══ -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>Sliders Dashboard</h1>
      <p id="hdr-sub">Loading…</p>
      <div class="nav-row">
        <button class="nav-btn active" id="nav-participants" onclick="showSummary()">Participants</button>
        <button class="nav-btn" id="nav-survey" onclick="showSurveyResults()">Survey Results</button>
      </div>
    </div>

    <div class="filters">
      <!-- Vocab -->
      <div class="filter-row">
        <div class="filter-label"><span>Vocab</span></div>
        <div class="pill-row" id="pills-vocab">
          <button class="pill pill-all active" onclick="pillAll('vocab',this)">All</button>
          <button class="pill" onclick="pillToggle('vocab','single',this)">Single</button>
          <button class="pill" onclick="pillToggle('vocab','multi',this)">Multi</button>
        </div>
      </div>
      <!-- Setup -->
      <div class="filter-row">
        <div class="filter-label"><span>Version</span></div>
        <div class="pill-row" id="pills-version">
          <button class="pill pill-all active" onclick="pillAll('version',this)">All</button>
          <button class="pill" onclick="pillToggle('version','control',this)">Control</button>
          <button class="pill" onclick="pillToggle('version','sliders',this)">Sliders</button>
        </div>
      </div>

      <!-- Tasks pills -->
      <div class="filter-row">
        <div class="filter-label"><span>Tasks</span></div>
        <div class="pill-row" id="pills-tasks">
          <button class="pill pill-all active" onclick="pillAll('tasks',this)">All</button>
          <button class="pill" onclick="pillToggle('tasks','5',this)">5</button>
          <button class="pill" onclick="pillToggle('tasks','6',this)">6</button>
          <button class="pill" onclick="pillToggle('tasks','8',this)">8</button>
          <button class="pill" onclick="pillToggle('tasks','10',this)">10</button>
        </div>
      </div>
      <!-- Concepts pills -->
      <div class="filter-row">
        <div class="filter-label"><span>Sliders / Concepts</span></div>
        <div class="pill-row" id="pills-concepts">
          <button class="pill pill-all active" onclick="pillAll('concepts',this)">All</button>
          <button class="pill" onclick="pillToggle('concepts','6',this)">6</button>
          <button class="pill" onclick="pillToggle('concepts','8',this)">8</button>
          <button class="pill" onclick="pillToggle('concepts','10',this)">10</button>
          <button class="pill" onclick="pillToggle('concepts','12',this)">12</button>
        </div>
      </div>

      <div class="filter-actions">
        <span class="match-count" id="match-count"></span>
        <button class="clear-btn" onclick="clearFilters()">Clear all</button>
      </div>
    </div>

    <div class="participant-list">
      <div class="p-list-label">Participants</div>
      <div id="p-list"></div>
    </div>
  </aside>

  <!-- ══ MAIN ══ -->
  <main class="main">
    <!-- Summary table view -->
    <div id="view-summary">
      <div class="loading">Loading data…</div>
    </div>
    <!-- Drill-in view -->
    <div id="view-drill" class="drill-panel">
      <button class="back-btn" onclick="showSummary()">← Back to participants</button>
      <div id="drill-session-bar"></div>
      <div class="compare-banner" id="compare-banner"></div>
      <div class="task-strip" id="task-strip"></div>
      <div id="task-detail"></div>
    </div>
    <!-- Survey results (aggregate) view -->
    <div id="view-survey" style="display:none;"></div>
  </main>
</div>

<div class="img-modal-overlay" id="imgModal" onclick="closeModal()">
  <img id="imgModalSrc" src="" alt="zoomed">
</div>

<script>
// ══ State ══════════════════════════════════════════════════════════════════
let allSessions = [];
let filteredSessions = [];
let activeSession = null;
let activeTaskId  = null;
let rankChart = null, sliderChart = null;

const filters = {
  vocab: new Set(), version: new Set(),
  tasks: new Set(), concepts: new Set(),
};

// ══ Modal ══════════════════════════════════════════════════════════════════
function openModal(src) { document.getElementById('imgModalSrc').src = src; document.getElementById('imgModal').classList.add('open'); }
function closeModal() { document.getElementById('imgModal').classList.remove('open'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ══ Data loading ═══════════════════════════════════════════════════════════
async function loadJSON(p) { const r = await fetch(p); return r.json(); }
function parseDate(v) { if (v && typeof v === 'object' && '$date' in v) v = v['$date']; return v ? new Date(v) : null; }
function durSec(a, b) { return Math.round((parseDate(b) - parseDate(a)) / 1000); }

async function buildData() {
  const [sessions, tasks, searches, clicks, surveys] = await Promise.all([
    loadJSON('/api/raw/sessions'), loadJSON('/api/raw/tasks'),
    loadJSON('/api/raw/searches'), loadJSON('/api/raw/clicks'),
    loadJSON('/api/raw/surveys'),
  ]);
  const sByTask = {}, cBySearch = {}, surveyBySession = {};
  searches.forEach(s => { sByTask[s.task_id] = sByTask[s.task_id] || []; sByTask[s.task_id].push(s); });
  clicks.forEach(c => { cBySearch[c.search_id] = cBySearch[c.search_id] || []; cBySearch[c.search_id].push(c); });
  surveys.forEach(sv => { surveyBySession[sv.session_id] = sv; });

  return sessions.map(sess => {
    const sid = sess.session_id;
    const sessionTasks = tasks.filter(t => t.session_id === sid).sort((a,b) => a.task_idx - b.task_idx).map(task => {
      const tid = task.task_id;
      const taskSearches = (sByTask[tid] || []).sort((a,b) => parseDate(a.timestamp)-parseDate(b.timestamp)).map(srch => {
        const sc = cBySearch[srch.search_id] || [];
        const rawSliders = srch.sliders || [];
        const ts = srch.timestamp;
        return {
          search_id: srch.search_id,
          timestamp: (ts && typeof ts==='object' && '$date' in ts) ? ts['$date'] : ts,
          query_text: srch.query_text || '',
          sliders: rawSliders.map(sl => ({ name: sl.name, value: Math.round((sl.value??0)*1000)/1000 })),
          has_sliders: rawSliders.length > 0,
          target_rank: srch.target_rank ?? null,
          target_clicked: sc.some(c => c.is_target),
          non_target_click_count: sc.filter(c => !c.is_target).length,
        };
      });
      const ranks = taskSearches.map(s => s.target_rank).filter(r => r!==null);

      // Determine the single "last action" for this task: the transition
      // into the final search of the task (regardless of outcome).
      let lastAction = null;
      if (taskSearches.length > 0) {
        const idx = taskSearches.length - 1;
        const cur = taskSearches[idx];
        const prev = idx > 0 ? taskSearches[idx - 1] : null;
        lastAction = computeActionLabel(cur, prev);
      }

      return {
        task_id: tid, task_idx: task.task_idx, target_path: task.target_path,
        status: task.status,
        duration_sec: durSec(task.start_time, task.end_time),
        searches: taskSearches, search_count: taskSearches.length,
        best_rank: ranks.length ? Math.min(...ranks) : null,
        final_rank: ranks.length ? ranks[ranks.length-1] : null,
        last_action: lastAction,
      };
    });
    const dur = durSec(sess.start_time, sess.end_time);

    // Tally each task's last action into a per-participant strategy label.
    // 'initial search' and 'query change' both count as a query vote;
    // 'slider adjustment' counts as a slider vote; 'no change' is excluded
    // from both tallies. Ties (including 0-0) default to 'query'.
    const queryVotes  = sessionTasks.filter(t => t.last_action === 'query change' || t.last_action === 'initial search').length;
    const sliderVotes = sessionTasks.filter(t => t.last_action === 'slider adjustment').length;
    const strategy = sliderVotes > queryVotes ? 'sliders' : 'query';

    return {
      session_id: sid,
      participant: sess.participant || sid,
      vocab: sess.vocab || sess.dataset || '',
      version: sess.slider_version === 0 ? 'control' : sess.slider_version === 1 ? 'sliders' : (sess.setup || ''),
      numTasks: sess.tasks ?? sessionTasks.length,
      numConcepts: sess.concepts ?? null,
      numResults: sess.results ?? null,
      duration_sec: dur,
      task_count: sessionTasks.length,
      tasks: sessionTasks,
      success_count: sessionTasks.filter(t => t.status==='success').length,
      skip_count:    sessionTasks.filter(t => t.status==='skip').length,
      failure_count: sessionTasks.filter(t => t.status==='failure').length,
      survey: surveyBySession[sid] || null,
      strategy, query_vote_count: queryVotes, slider_vote_count: sliderVotes,
    };
  });
}

// ══ Filter UI ══════════════════════════════════════════════════════════════
function buildFilterUI() {
  // All pill groups are hardcoded in HTML — nothing to render dynamically
}

function pillToggle(key, val, el) {
  filters[key].has(val) ? filters[key].delete(val) : filters[key].add(val);
  el.classList.toggle('active', filters[key].has(val));
  document.querySelector(`#pills-${key} .pill-all`).classList.toggle('active', filters[key].size === 0);
  applyFilters();
}
function pillAll(key, el) {
  filters[key].clear();
  document.querySelectorAll(`#pills-${key} .pill`).forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}


function clearFilters() {
  ['vocab','setup','tasks','concepts'].forEach(k => {
    filters[k].clear();
    document.querySelectorAll(`#pills-${k} .pill`).forEach(p => p.classList.remove('active'));
    document.querySelector(`#pills-${k} .pill-all`).classList.add('active');
  });
  applyFilters();
}

function applyFilters() {
  filteredSessions = allSessions.filter(s => {
    if (filters.vocab.size    && !filters.vocab.has(s.vocab))                  return false;
    if (filters.version.size  && !filters.version.has(s.version))              return false;
    if (filters.tasks.size    && !filters.tasks.has(String(s.numTasks)))       return false;
    if (filters.concepts.size && !filters.concepts.has(String(s.numConcepts))) return false;
    return true;
  });
  document.getElementById('match-count').innerHTML =
    `<strong>${filteredSessions.length}</strong> of ${allSessions.length} participants`;
  document.getElementById('hdr-sub').textContent =
    `${filteredSessions.length} participant${filteredSessions.length!==1?'s':''} shown`;
  renderParticipantList();
  renderSummaryTable();
  if (document.getElementById('view-survey').style.display !== 'none') renderSurveyResults();
}

// ══ Participant list (sidebar) ══════════════════════════════════════════════
function renderParticipantList() {
  const el = document.getElementById('p-list');
  if (!filteredSessions.length) {
    el.innerHTML = `<div class="no-match">No participants match.</div>`; return;
  }
  el.innerHTML = filteredSessions.map(s => {
    const rate = Math.round(s.success_count / s.task_count * 100);
    const dot  = rate>=70 ? 'var(--green)' : rate>=40 ? 'var(--amber)' : 'var(--red)';
    const isActive = activeSession && s.session_id === activeSession.session_id;
    return `<button class="p-btn ${isActive?'active':''}" onclick="drillIn('${s.session_id}')">
      <span class="p-dot" style="background:${dot}"></span>
      <div class="p-info">
        <div class="p-name">${s.participant}</div>
        <div class="p-chips">
          ${s.vocab   ? `<span class="p-chip">${s.vocab}</span>` : ''}
          ${s.version ? `<span class="p-chip">${s.version}</span>` : ''}
          ${s.numTasks!=null ? `<span class="p-chip">${s.numTasks}t</span>` : ''}
          ${s.numConcepts!=null ? `<span class="p-chip">${s.numConcepts}c</span>` : ''}
          ${s.numResults!=null ? `<span class="p-chip">${s.numResults}r</span>` : ''}
        </div>
      </div>
      <span class="p-rate" style="color:${dot}">${rate}%</span>
    </button>`;
  }).join('');
}

// ══ Summary table ══════════════════════════════════════════════════════════

    <div class="summary-header">

      <p>${filteredSessions.length} matching</p>
    </div>
    <table class="summary-table">
      <thead>
        <tr>
          <th>Participant</th>

          <th></th>
        </tr>
      </thead>
      <tbody>
        ${filteredSessions.map(s => {
          const rate = Math.round(s.success_count / s.task_count * 100);

          const stratColor = s.strategy === 'sliders' ? 'var(--accent2)' : 'var(--accent)';

              <div class="mini-bar-wrap">

// ══ Drill-in ═══════════════════════════════════════════════════════════════
function drillIn(sessionId) {
  activeSession = allSessions.find(s => s.session_id === sessionId);
  activeTaskId  = null;
  renderParticipantList();

  document.getElementById('view-summary').style.display = 'none';
  document.getElementById('view-survey').style.display = 'none';
  document.getElementById('view-drill').classList.add('visible');
  document.getElementById('nav-participants').classList.add('active');
  document.getElementById('nav-survey').classList.remove('active');

  // Session bar
  const d = activeSession;
  const rate = Math.round(d.success_count/d.task_count*100);
  document.getElementById('drill-session-bar').innerHTML = `
    <div class="session-bar">
      <div class="stat"><span class="stat-val">${d.task_count}</span><span class="stat-label">Tasks</span></div>
      <div class="divider"></div>
      <div class="stat"><span class="stat-val" style="color:var(--green)">${d.success_count}</span><span class="stat-label">Success</span></div>
      <div class="divider"></div>
      <div class="stat"><span class="stat-val" style="color:var(--accent)">${d.skip_count}</span><span class="stat-label">Skipped</span></div>
      <div class="divider"></div>
      <div class="stat"><span class="stat-val" style="color:var(--red)">${d.failure_count}</span><span class="stat-label">Incorrect</span></div>
      <div class="divider"></div>
      <div class="stat"><span class="stat-val" style="color:var(--accent)">${rate}%</span><span class="stat-label">Rate</span></div>
      <div class="divider"></div>
      <div class="stat"><span class="stat-val">${fmtDur(d.duration_sec)}</span><span class="stat-label">Duration</span></div>
      <div class="config-chips">
        ${d.vocab     ? `<span class="config-chip">vocab: ${d.vocab}</span>` : ''}
        ${d.version   ? `<span class="config-chip">version: ${d.version}</span>` : ''}
        ${d.numTasks!=null ? `<span class="config-chip">tasks: ${d.numTasks}</span>` : ''}
        ${d.numConcepts!=null ? `<span class="config-chip">concepts: ${d.numConcepts}</span>` : ''}
        ${d.numResults!=null ? `<span class="config-chip">results: ${d.numResults}</span>` : ''}
      </div>
    </div>`;

  // Task strip
  const taskChips = activeSession.tasks.map(t => {
    const cls = t.status === 'success' ? 'success' : t.status === 'failure' ? 'failure' : 'skip';
    const dot = t.status === 'success' ? '✓' : t.status === 'failure' ? '✕' : '⊘';
    return `<button class="task-chip ${cls}" data-id="${t.task_id}" onclick="selectTask('${t.task_id}')">
      ${dot} Task ${t.task_idx+1}
    </button>`;
  }).join('');
  const surveyChip = `<button class="task-chip" data-id="__survey__" onclick="selectSurvey()">📋 Survey</button>`;
  document.getElementById('task-strip').innerHTML = taskChips + surveyChip;

  selectTask(activeSession.tasks[0].task_id);
}

function showSummary() {
  activeSession = null; activeTaskId = null;
  document.getElementById('view-summary').style.display = '';
  document.getElementById('view-drill').classList.remove('visible');
  document.getElementById('view-survey').style.display = 'none';
  document.getElementById('nav-participants').classList.add('active');
  document.getElementById('nav-survey').classList.remove('active');
  renderParticipantList();
}

function showSurveyResults() {
  activeSession = null; activeTaskId = null;
  document.getElementById('view-summary').style.display = 'none';
  document.getElementById('view-drill').classList.remove('visible');
  document.getElementById('view-survey').style.display = '';
  document.getElementById('nav-participants').classList.remove('active');
  document.getElementById('nav-survey').classList.add('active');
  renderParticipantList();
  renderSurveyResults();
}

function selectTask(taskId) {
  activeTaskId = taskId;
  document.querySelectorAll('.task-chip').forEach(b => b.classList.toggle('active', b.dataset.id === taskId));
  const task = activeSession.tasks.find(t => t.task_id === taskId);
  renderTaskDetail(task);
}

// ══ Task detail ════════════════════════════════════════════════════════════
function renderTaskDetail(task) {
  if (rankChart)   { rankChart.destroy();   rankChart   = null; }
  if (sliderChart) { sliderChart.destroy(); sliderChart = null; }

  const searches = task.searches;
  const statusBadge = task.status==='success' ? `<span class="badge badge-green">✓ success</span>`
    : task.status==='failure' ? `<span class="badge badge-red">✕ incorrect</span>`
    : `<span class="badge badge-blue">⊘ skipped</span>`;
  const bestRankBadge = task.best_rank!=null ? `<span class="badge ${rankCls(task.best_rank)}">Best rank: #${task.best_rank}</span>` : `<span class="badge badge-muted">No rank data</span>`;

  let lastActionBadge = '';
  if (searches.length > 0) {
    const idx = searches.length - 1;
    const os = searches[idx], ps = idx > 0 ? searches[idx - 1] : null;
    const al = actionLabel(os, ps);
    const badgeCls = task.status==='success' ? 'badge-green' : task.status==='failure' ? 'badge-red' : 'badge-blue';
    lastActionBadge = `<span class="badge ${badgeCls}">${task.status==='success'?'→ ':'last: '}${al}</span>`;
  }

  document.getElementById('task-detail').innerHTML = `
    <div class="task-header">
      <img class="target-img" src="${task.target_path}" alt="target" onclick="openModal('${task.target_path}')" onerror="this.style.opacity=0.15">
      <div class="task-info">
        <h2>Task ${task.task_idx+1}</h2>
        <div class="badges">
          ${statusBadge}${bestRankBadge}
          <span class="badge badge-blue">${task.search_count} searches</span>
          <span class="badge badge-muted">${fmtDur(task.duration_sec)}</span>
          ${lastActionBadge}
        </div>
      </div>
    </div>
    <div class="charts-row">
      <div class="card">
        <h3>Target rank over searches</h3>
        <div style="position:relative;height:170px;"><canvas id="rankChart"></canvas></div>
        <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:8px;">
          <span style="font-size:10px;color:#22c987;display:flex;align-items:center;gap:4px;"><span style="width:9px;height:9px;border-radius:50%;background:#22c987;display:inline-block;"></span>Top 10</span>
          <span style="font-size:10px;color:#f5a623;display:flex;align-items:center;gap:4px;"><span style="width:9px;height:9px;border-radius:50%;background:#f5a623;display:inline-block;"></span>11–50</span>
          <span style="font-size:10px;color:#f25c5c;display:flex;align-items:center;gap:4px;"><span style="width:9px;height:9px;border-radius:50%;background:#f25c5c;display:inline-block;"></span>50+</span>
          <span style="font-size:10px;color:#e8eaf6;display:flex;align-items:center;gap:4px;"><span style="width:9px;height:9px;background:#e8eaf6;display:inline-block;transform:rotate(45deg);"></span>Target found</span>
        </div>
      </div>
      <div class="card">
        <h3>Slider usage frequency</h3>
        <div style="position:relative;height:170px;"><canvas id="sliderChart"></canvas></div>
      </div>
    </div>
    <div class="card" style="margin-bottom:24px;">
      <h3>Search timeline</h3>
      <div class="timeline" id="timeline"></div>
    </div>`;

  renderRankChart(task);
  renderSliderFreq(task);
  renderTimeline(task);
}

function renderRankChart(task) {
  const ss = task.searches;
  const ranks  = ss.map(s => s.target_rank);
  const colors = ranks.map(r => r==null?'rgba(123,130,166,0.3)':r<=10?'#22c987':r<=50?'#f5a623':'#f25c5c');
  rankChart = new Chart(document.getElementById('rankChart'), {
    type: 'line',
    data: { labels: ss.map((_,i)=>`S${i+1}`), datasets: [{
      data: ranks, borderColor:'#4f7cff', backgroundColor:'rgba(79,124,255,0.08)',
      pointBackgroundColor: colors, pointBorderColor: colors,
      pointStyle: ss.map(s=>s.target_clicked?'rectRot':'circle'),
      pointRadius: ss.map(s=>s.target_clicked?10:6), pointHoverRadius: ss.map(s=>s.target_clicked?12:8),
      tension:0.3, fill:true, spanGaps:true,
    }]},
    options: { responsive:true, maintainAspectRatio:false,
      plugins: { legend:{display:false}, tooltip:{ callbacks:{
        title: ctx=>`Search ${ctx[0].dataIndex+1}`,
        label: ctx => {
          const i=ctx.dataIndex;
          return [ranks[i]!=null?`Rank: #${ranks[i]}`:'Rank: n/a', `Action: ${actionLabel(ss[i],i>0?ss[i-1]:null)}`, `Query: "${ss[i].query_text}"`, ...(ss[i].target_clicked?['✓ Target found here']:[])];
        }},
        backgroundColor:'#1a1d27', borderColor:'#2e3250', borderWidth:1, titleColor:'#e8eaf6', bodyColor:'#7b82a6', padding:10, displayColors:false,
      }},
      scales:{
        y:{ reverse:true, grid:{color:'rgba(46,50,80,0.8)'}, ticks:{color:'#7b82a6',font:{size:10}}, title:{display:true,text:'Rank',color:'#7b82a6',font:{size:10}} },
        x:{ grid:{color:'rgba(46,50,80,0.8)'}, ticks:{color:'#7b82a6',font:{size:10}} }
      }
    }
  });
}

function renderSliderFreq(task) {
  const ss = task.searches.filter(s=>s.has_sliders);
  if (!ss.length) return;
  const names = ss[0].sliders.map(sl=>sl.name);
  const paired = names.map((name,ni)=>({ name, count: ss.filter(s=>s.sliders[ni]?.value!==0).length })).sort((a,b)=>b.count-a.count);
  const colors = ['#4f7cff','#7c5cfc','#22c987','#f5a623','#f25c5c','#36d9c8','#ff7eb3','#a0e220','#ff9f40','#9966ff','#c9cb3a','#ff6b6b'];
  sliderChart = new Chart(document.getElementById('sliderChart'), {
    type:'bar',
    data:{ labels:paired.map(p=>p.name), datasets:[{ data:paired.map(p=>p.count),
      backgroundColor:paired.map((_,i)=>colors[i%colors.length]+'cc'),
      borderColor:paired.map((_,i)=>colors[i%colors.length]), borderWidth:1, borderRadius:4 }]},
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
      scales:{
        y:{ beginAtZero:true, ticks:{color:'#7b82a6',font:{size:10},stepSize:1}, grid:{color:'rgba(46,50,80,0.8)'}, title:{display:true,text:'# searches',color:'#7b82a6',font:{size:10}} },
        x:{ ticks:{color:'#7b82a6',font:{size:9},maxRotation:45}, grid:{color:'rgba(46,50,80,0.8)'} }
      }
    }
  });
}

function groupSearchesByQuery(searches) {
  // Groups consecutive searches that share the same query_text into one
  // block, so a sequence of slider-only tweaks doesn't repeat the query.
  const groups = [];
  searches.forEach((s, i) => {
    const prevGroup = groups[groups.length - 1];
    if (prevGroup && prevGroup.query_text === s.query_text) {
      prevGroup.steps.push({ search: s, idx: i });
    } else {
      groups.push({ query_text: s.query_text, steps: [{ search: s, idx: i }] });
    }
  });
  return groups;
}

function renderChangedSliderBars(sliders) {
  // Visual bar for just the slider(s) that moved this step — shown inline
  // in the main step row so the adjustment is visible without opening the
  // dropdown. Fills grow outward from a 0 center: negative goes left (red),
  // positive goes right (blue/accent).
  const changed = sliders
    .map((sl, i) => ({ ...sl, idx: i }))
    .filter(sl => sl.value !== 0);
  if (!changed.length) return '';
  return `<div class="step-slider-bars">${changed.map(sl => {
    const pct = Math.round(sl.value*100), neg = pct<0;
    const halfWidth = Math.min(Math.abs(pct),100) / 2;
    const left = neg ? (50 - halfWidth) : 50;
    return `<div class="slider-row">
      <span class="slider-idx" style="width:24px;">#${sl.idx+1}</span>
      <span class="slider-name">${sl.name}</span>
      <div class="slider-track"><div class="slider-fill" style="left:${left}%;width:${halfWidth}%;background:${neg?'var(--red)':'linear-gradient(90deg,var(--accent),var(--accent2))'}"></div></div>
      <span class="slider-pct" style="color:${neg?'var(--red)':'var(--muted)'}">${sl.value.toFixed(3)}</span>
    </div>`;
  }).join('')}</div>`;
}

function renderSliderList(sliders) {
  // Numbered slider list (#1, #2, ...) with the name and the raw numeric
  // value emphasized, since the value itself matters more than a bar.
  return sliders.map((sl, i) => {
    const v = sl.value ?? 0;
    const isZero = v === 0;
    const color = v > 0 ? 'var(--green)' : v < 0 ? 'var(--red)' : 'var(--muted)';
    return `<div class="slider-num-row${isZero?' zero':''}">
      <span class="slider-idx">#${i+1}</span>
      <span class="slider-num-name">${sl.name}</span>
      <span class="slider-num-val" style="color:${color}">${v.toFixed(3)}</span>
    </div>`;
  }).join('');
}

function renderTimeline(task) {
  const groups = groupSearchesByQuery(task.searches);
  document.getElementById('timeline').innerHTML = groups.map((g, gi) => {
    const firstIdx = g.steps[0].idx;
    const prevSearch = firstIdx > 0 ? task.searches[firstIdx - 1] : null;
    const groupActionTag = prevSearch
      ? `<span class="badge badge-blue">query change</span>`
      : `<span class="badge badge-muted">initial</span>`;
    const anyFoundInGroup = g.steps.some(st => st.search.target_clicked);

    const stepsHtml = g.steps.map((st, si) => {
      const s = st.search, i = st.idx;
      const prev = i > 0 ? task.searches[i - 1] : null;
      const al = si === 0 ? (prevSearch ? 'query change' : 'initial search') : actionLabel(s, prev);
      const stepTag = si === 0 ? '' : `<span class="badge ${al==='no change'?'badge-muted':'badge-blue'}">${al}</span>`;
      const successTag = s.target_clicked ? `<span class="badge badge-green">✓ found</span>` : '';
      const rankBadge  = s.target_rank!=null ? `<span class="badge ${rankCls(s.target_rank)}">rank #${s.target_rank}</span>` : `<span class="badge badge-muted">no rank</span>`;
      const ntBadge     = s.non_target_click_count>0 ? `<span class="badge badge-amber">${s.non_target_click_count} other click${s.non_target_click_count>1?'s':''}</span>` : '';
      const changedBars = s.has_sliders ? renderChangedSliderBars(s.sliders) : '';
      const stepKey = `${task.task_id}_${gi}_${si}`;

      return `<div class="search-step">
        <div class="search-step-head">
          <span class="step-num">${i+1}</span>
          <span class="timestamp">${new Date(s.timestamp).toTimeString().slice(0,8)}</span>
          ${stepTag}${rankBadge}${successTag}${ntBadge}
          ${s.has_sliders ? `<span class="step-config-toggle" id="toggle_${stepKey}" onclick="toggleStepSliders('${stepKey}')">full config ▾</span>` : `<span class="no-data" style="font-size:11px;margin-left:auto;">Text-only</span>`}
        </div>
        ${changedBars ? `<div class="step-changed-bars">${changedBars}</div>` : (s.has_sliders ? `<p class="no-data" style="font-size:11px;padding:0 10px 8px;">All sliders unchanged this step</p>` : '')}
        <div class="step-slider-detail" id="detail_${stepKey}" style="display:none;">
          ${s.has_sliders ? renderSliderList(s.sliders) : ''}
        </div>
      </div>`;
    }).join('');

    return `<div class="timeline-item">
      <div class="step-circle ${anyFoundInGroup?'clicked':''}">${gi+1}</div>
      <div class="search-card" style="${anyFoundInGroup?'border-color:var(--green);':''}">
        <div class="search-top">
          <span class="query">"${g.query_text}"</span>
          <div style="display:flex;gap:5px;flex-wrap:wrap;">${groupActionTag}<span class="badge badge-muted">${g.steps.length} search${g.steps.length!==1?'es':''}</span></div>
        </div>
        <div class="search-steps-list">${stepsHtml}</div>
      </div>
    </div>`;
  }).join('');
}

function toggleStepSliders(stepKey) {
  const detail = document.getElementById('detail_' + stepKey);
  const toggle = document.getElementById('toggle_' + stepKey);
  if (!detail) return;
  const isOpen = detail.style.display !== 'none';
  detail.style.display = isOpen ? 'none' : '';
  if (toggle) {
    toggle.textContent = toggle.textContent.replace(isOpen ? '▴' : '▾', isOpen ? '▾' : '▴');
  }
}

// ══ Helpers ════════════════════════════════════════════════════════════════
function computeActionLabel(s, prev) {
  if (!prev) return 'initial search';
  if (s.query_text !== prev.query_text) return 'query change';
  if (s.sliders.some((sl,j) => sl.value !== (prev.sliders[j]?.value??0))) return 'slider adjustment';
  return 'no change';
}
function actionLabel(s, prev) { return computeActionLabel(s, prev); }
function rankCls(r) { return r==null?'badge-muted':r<=10?'badge-green':r<=50?'badge-amber':'badge-red'; }
function fmtDur(sec) { const m=Math.floor(sec/60),s=sec%60; return m>0?`${m}m ${s}s`:`${s}s`; }

// ══ Survey (NASA-TLX + SUS) ══════════════════════════════════════════════════
const TLX_FIELDS = [
  { key: 'mental',      label: 'Mental Demand',  full: 'How mentally demanding was the task?' },
  { key: 'temporal',    label: 'Pace / Rush',    full: 'How hurried or rushed was the pace of the task?' },
  { key: 'performance', label: 'Performance',    full: 'How successful were you in accomplishing what you were asked to do? (Perfect–Failure)' },
  { key: 'effort',      label: 'Effort',         full: 'How hard did you have to work to accomplish your level of performance?' },
  { key: 'frustration', label: 'Frustration',    full: 'How insecure, discouraged, irritated, stressed, and annoyed were you?' },
];
const SUS_FIELDS = [
  { key: 'sus1',  label: 'Would use frequently',        full: 'I think that I would like to use this system frequently.' },
  { key: 'sus2',  label: 'Unnecessarily complex',        full: 'I found the system unnecessarily complex.' },
  { key: 'sus3',  label: 'Easy to use',                  full: 'I thought the system was easy to use.' },
  { key: 'sus4',  label: 'Needs technical support',      full: 'I think that I would need the support of a technical person to be able to use this system.' },
  { key: 'sus5',  label: 'Functions well integrated',    full: 'I found the various functions in this system were well integrated.' },
  { key: 'sus6',  label: 'Too much inconsistency',       full: 'I thought there was too much inconsistency in this system.' },
  { key: 'sus7',  label: 'Quick to learn',                full: 'I would imagine that most people would learn to use this system very quickly.' },
  { key: 'sus8',  label: 'Cumbersome to use',             full: 'I found the system very cumbersome to use.' },
  { key: 'sus9',  label: 'Felt confident',                full: 'I felt very confident using the system.' },
  { key: 'sus10', label: 'Needed to learn a lot first',   full: 'I needed to learn a lot of things before I could get going with this system.' },
];

function fieldAverage(sessions, group, key) {
  const vals = sessions
    .map(s => s.survey?.[group]?.[key])
    .filter(v => v !== null && v !== undefined && v !== '');
  if (!vals.length) return null;
  return vals.reduce((a,b) => a+b, 0) / vals.length;
}

function renderScoreBar(label, value, maxValue, fullText) {
  const pct = value==null ? 0 : Math.round((value/maxValue)*100);
  const display = value==null ? '—' : value.toFixed(2);
  const titleAttr = fullText ? ` title="${fullText.replace(/"/g,'&quot;')}"` : '';
  return `<div class="slider-row"${titleAttr}>
    <span class="slider-name">${label}</span>
    <div class="slider-track"><div class="slider-fill" style="width:${pct}%;background:linear-gradient(90deg,var(--accent),var(--accent2))"></div></div>
    <span class="slider-pct" style="color:var(--muted)">${display}</span>
  </div>`;
}

function renderLikertRow(questionText, value, scaleMax, lowLabel, highLabel) {
  const points = Array.from({length: scaleMax}, (_,i) => i+1);
  const dots = points.map(p => {
    const isSelected = value === p;
    return `<div class="likert-point ${isSelected?'selected':''}">
      <div class="likert-dot">${isSelected ? p : ''}</div>
      <span class="likert-num">${p}</span>
    </div>`;
  }).join('');
  return `<div class="likert-row">
    <p class="likert-question">${questionText}</p>
    <div class="likert-scale">
      <span class="likert-end-label">${lowLabel}</span>
      <div class="likert-points">${dots}</div>
      <span class="likert-end-label">${highLabel}</span>
    </div>
    ${value==null ? '<p class="no-data" style="font-size:11px;">No response</p>' : ''}
  </div>`;
}

const FREQ_LEVELS = ['Never', 'Rarely', 'Sometimes', 'Often', 'Very Frequently'];
function renderLikertFreqRow(value) {
  const dots = FREQ_LEVELS.map(level => {
    const isSelected = value === level;
    return `<div class="likert-point ${isSelected?'selected':''}">
      <div class="likert-dot" style="width:auto;height:22px;padding:0 8px;border-radius:11px;">${level}</div>
    </div>`;
  }).join('');
  return `<div class="likert-row" style="border-bottom:none;">
    <p class="likert-question">How frequently do you use image-based search tools (e.g., Google Images, Google Lens, Pinterest)?</p>
    <div class="likert-points" style="justify-content:flex-start;gap:10px;">${dots}</div>
    ${value==null ? '<p class="no-data" style="font-size:11px;">No response</p>' : ''}
  </div>`;
}

// -- Aggregate view (top-level "Survey Results" nav) -------------------------
function renderConditionBlock(sessions, label, n) {
  if (!sessions.length) return '';
  const tlxRows = TLX_FIELDS.map(f => renderScoreBar(f.label, fieldAverage(sessions,'workload',f.key), 7, f.full)).join('');
  const susRows = SUS_FIELDS.map(f => renderScoreBar(f.label, fieldAverage(sessions,'usability',f.key), 5, f.full)).join('');
  return `
    <div class="condition-block">
      <div class="condition-label">${label} <span style="font-weight:400;color:var(--muted)">(n=${n})</span></div>
      <div class="card" style="margin-bottom:0;">
        <h3>NASA-TLX (avg, scale 1–7)</h3>
        <div class="sliders-grid" style="margin-top:8px;">${tlxRows}</div>
      </div>
      <div class="card" style="margin-top:12px;margin-bottom:0;">
        <h3>SUS (avg, scale 1–5)</h3>
        <div class="sliders-grid" style="margin-top:8px;">${susRows}</div>
      </div>
    </div>`;
}

function renderSurveyResults() {
  const el = document.getElementById('view-survey');
  const withSurvey = filteredSessions.filter(s => s.survey);
  if (!withSurvey.length) {
    el.innerHTML = `<div class="loading">No survey responses match the current filters.</div>`;
    return;
  }

  const control  = withSurvey.filter(s => s.version === 'control');
  const sliders  = withSurvey.filter(s => s.version === 'sliders');
  const hasBoth  = control.length > 0 && sliders.length > 0;

  const aggregateHTML = hasBoth
    ? `<div class="conditions-row">
        ${renderConditionBlock(control, 'Control', control.length)}
        ${renderConditionBlock(sliders, 'Sliders', sliders.length)}
       </div>`
    : renderConditionBlock(withSurvey,
        control.length ? 'Control' : sliders.length ? 'Sliders' : 'All',
        withSurvey.length);

  el.innerHTML = `
    <div class="summary-header">
      <h2>Survey Results</h2>
      <p>${withSurvey.length} participant${withSurvey.length!==1?'s':''} with completed surveys (averages, current filters)</p>
    </div>
    ${aggregateHTML}
    <div class="card" style="margin-top:24px;margin-bottom:24px;">
      <h3>Individual responses</h3>
      <table class="summary-table">
        <thead><tr><th>Participant</th><th>Version</th><th>Mental</th><th>Temporal</th><th>Perf.</th><th>Effort</th><th>Frust.</th><th>SUS avg</th><th></th></tr></thead>
        <tbody>
          ${withSurvey.map(s => {
            const w = s.survey.workload || {};
            const susAvg = SUS_FIELDS.reduce((sum,f)=>sum+(s.survey.usability?.[f.key]!=null ? s.survey.usability[f.key] : 0),0) / SUS_FIELDS.length;
            const vChip = s.version ? `<span class="p-chip" style="font-size:10px;">${s.version}</span>` : '—';
            return `<tr>
              <td><strong>${s.participant}</strong></td>
              <td>${vChip}</td>
              <td>${w.mental ?? '—'}</td><td>${w.temporal ?? '—'}</td><td>${w.performance ?? '—'}</td>
              <td>${w.effort ?? '—'}</td><td>${w.frustration ?? '—'}</td>
              <td>${susAvg.toFixed(1)}</td>
              <td><button class="drill-btn" onclick="drillIn('${s.session_id}');selectSurvey();">View →</button></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;
}

// -- Per-participant survey tab (inside drill-in view) ------------------------
function selectSurvey() {
  activeTaskId = '__survey__';
  document.querySelectorAll('.task-chip').forEach(b => b.classList.toggle('active', b.dataset.id === '__survey__'));
  if (rankChart)   { rankChart.destroy();   rankChart   = null; }
  if (sliderChart) { sliderChart.destroy(); sliderChart = null; }

  const survey = activeSession.survey;
  if (!survey) {
    document.getElementById('task-detail').innerHTML = `<div class="card"><p class="no-data">No survey response for this participant.</p></div>`;
    return;
  }
  const w = survey.workload || {}, u = survey.usability || {}, ot = survey.open_text || {};
  const tlxRows = TLX_FIELDS.map(f => renderLikertRow(f.full, w[f.key] ?? null, 7, 'Very Low', 'Very High')).join('');
  const susRows = SUS_FIELDS.map(f => renderLikertRow(f.full, u[f.key] ?? null, 5, 'Strongly Disagree', 'Strongly Agree')).join('');
  const freqRow = renderLikertFreqRow(survey.frequency);

  document.getElementById('task-detail').innerHTML = `
    <div class="card" style="margin-bottom:24px;">
      <h3>NASA-TLX</h3>
      ${tlxRows}
    </div>
    <div class="card" style="margin-bottom:24px;">
      <h3>System Usability Scale</h3>
      ${susRows}
    </div>
    <div class="card" style="margin-bottom:24px;">
      <h3>Background</h3>
      ${freqRow}
    </div>
    <div class="card" style="margin-bottom:24px;">
      <h3>Pilot feedback</h3>
      <div style="display:flex;flex-direction:column;gap:14px;">
        <div><p class="likert-question" style="margin-bottom:4px;">Were there any parts of the study where you felt confused or unsure what to do? If so, please describe.</p><p style="font-size:13px;color:var(--text);">${ot.confused || '<span class="no-data">No response</span>'}</p></div>
        <div><p class="likert-question" style="margin-bottom:4px;">Were any aspects of the experiment too difficult or frustrating? If so, what would have made them easier?</p><p style="font-size:13px;color:var(--text);">${ot.difficult || '<span class="no-data">No response</span>'}</p></div>
        <div><p class="likert-question" style="margin-bottom:4px;">Do you have any other feedback or suggestions for improving the study?</p><p style="font-size:13px;color:var(--text);">${ot.feedback || '<span class="no-data">No response</span>'}</p></div>
      </div>
    </div>`;
}

// ══ Init ═══════════════════════════════════════════════════════════════════
async function init() {
  const data = await buildData();
  if (!data.length) { document.getElementById('view-summary').innerHTML='<div class="loading">No data found.</div>'; return; }
  allSessions = data;
  filteredSessions = [...allSessions];
  buildFilterUI();
  applyFilters();
}
init();
</script>
</body>
